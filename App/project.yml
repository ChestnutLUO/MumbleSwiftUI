name: MumbleSwiftUI
options:
  bundleIdPrefix: cn.a5-p
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
packages:
  MumbleCore:
    path: ../MumbleCore
targets:
  MumbleSwiftUI:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: MumbleCore
        products:
          - MumbleProtocol
          - MumbleConnection
          - MumbleCrypto
          - MumbleAudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.a5-p.MumbleSwiftUI
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_IDENTITY: "-"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "MumbleSwiftUI uses the microphone to transmit your voice to the Mumble server."
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        GENERATE_INFOPLIST_FILE: true
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    entitlements:
      path: MumbleSwiftUI.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.device.audio-input: true
  MumbleSwiftUI-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: MumbleCore
        products:
          - MumbleProtocol
          - MumbleConnection
          - MumbleCrypto
          - MumbleAudio
    settings:
      base:
        PRODUCT_NAME: MumbleSwiftUI
        PRODUCT_BUNDLE_IDENTIFIER: cn.a5-p.MumbleSwiftUI
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # Device builds need a team: select one under Signing &
        # Capabilities (or add DEVELOPMENT_TEAM here). Simulator builds
        # work without.
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "MumbleSwiftUI uses the microphone to transmit your voice to the Mumble server."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: true
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
schemes:
  MumbleSwiftUI:
    build:
      targets:
        MumbleSwiftUI: all
    run:
      config: Debug
    archive:
      config: Release
  MumbleSwiftUI-iOS:
    build:
      targets:
        MumbleSwiftUI-iOS: all
    run:
      config: Debug
    archive:
      config: Release
